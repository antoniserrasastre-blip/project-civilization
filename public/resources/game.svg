  <!-- Cuerpo del ciervo (vista lateral) -->
  <rect x="3" y="7" width="8" height="4" fill="#8b4513"/>
  <rect x="2" y="8" width="2" height="3" fill="#8b4513"/>
  <rect x="10" y="7" width="2" height="3" fill="#8b4513"/>
  <!-- Vientre claro -->
  <rect x="4" y="9" width="6" height="2" fill="#a05520"/>
  <!-- Cabeza -->
  <rect x="10" y="5" width="4" height="4" fill="#8b4513"/>
  <rect x="11" y="4" width="3" height="2" fill="#8b4513"/>
  <!-- Hocico -->
  <rect x="13" y="7" width="2" height="2" fill="#7a3a10"/>
  <rect x="14" y="8" width="1" height="1" fill="#3a1a08"/>
  <!-- Ojo -->
  <rect x="12" y="5" width="1" height="1" fill="#1a0a04"/>
  <rect x="11" y="5" width="1" height="1" fill="#c08040"/>
  <!-- Cuerno -->
  <rect x="12" y="2" width="1" height="3" fill="#6b3510"/>
  <rect x="13" y="2" width="1" height="2" fill="#6b3510"/>
  <rect x="14" y="1" width="1" height="2" fill="#6b3510"/>
  <rect x="11" y="3" width="2" height="1" fill="#6b3510"/>
  <!-- Patas -->
  <rect x="4" y="11" width="2" height="3" fill="#6b3010"/>
  <rect x="7" y="11" width="2" height="3" fill="#6b3010"/>
  <rect x="10" y="10" width="2" height="4" fill="#6b3010"/>
