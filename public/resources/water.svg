<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Manantial: charco base -->
  <rect x="2" y="10" width="12" height="4" fill="#2a70b0"/>
  <rect x="1" y="11" width="2" height="2" fill="#2a70b0"/>
  <rect x="13" y="11" width="2" height="2" fill="#2a70b0"/>
  <rect x="3" y="9" width="10" height="2" fill="#2a70b0"/>
  <!-- Agua clara (interior) -->
  <rect x="4" y="10" width="8" height="3" fill="#50a0d8"/>
  <rect x="3" y="11" width="10" height="1" fill="#50a0d8"/>
  <!-- Reflejos -->
  <rect x="5" y="10" width="3" height="1" fill="#80c8f0"/>
  <rect x="10" y="11" width="2" height="1" fill="#80c8f0"/>
  <!-- Burbuja / manatial: chorro arriba -->
  <rect x="7" y="6" width="2" height="4" fill="#60b0e0"/>
  <rect x="6" y="7" width="4" height="3" fill="#60b0e0"/>
  <rect x="6" y="5" width="4" height="2" fill="#80c8f0"/>
