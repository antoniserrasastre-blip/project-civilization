  <rect x="7" y="3" width="2" height="3" fill="#90d8f0"/>
  <rect x="6" y="4" width="4" height="2" fill="#a0e0f8"/>
  <!-- Gota superior -->
  <rect x="8" y="2" width="2" height="2" fill="#c0f0ff"/>
