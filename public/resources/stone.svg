<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Sombra -->
  <ellipse cx="8" cy="15" rx="5" ry="1" fill="rgba(0,0,0,0.2)" shape-rendering="auto"/>
  <!-- Roca trasera (más oscura) -->
  <rect x="7" y="7" width="7" height="6" fill="#7a6a50"/>
  <rect x="6" y="8" width="2" height="5" fill="#7a6a50"/>
  <rect x="13" y="8" width="1" height="4" fill="#7a6a50"/>
  <rect x="7" y="6" width="5" height="2" fill="#7a6a50"/>
  <!-- Roca principal -->
  <rect x="1" y="9" width="9" height="5" fill="#a89070"/>
  <rect x="2" y="8" width="8" height="2" fill="#a89070"/>
  <rect x="3" y="7" width="6" height="2" fill="#a89070"/>
  <!-- Cara clara (luz desde arriba) -->
  <rect x="3" y="7" width="4" height="2" fill="#c8a880"/>
  <rect x="2" y="8" width="3" height="1" fill="#c0a070"/>
  <!-- Grieta / detalle -->
  <rect x="6" y="9" width="1" height="3" fill="#8a7050"/>
  <!-- Punto de luz -->
  <rect x="4" y="8" width="2" height="1" fill="#e0c090"/>
</svg>
