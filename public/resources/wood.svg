<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Sombra suelo -->
  <ellipse cx="8" cy="15" rx="4" ry="1" fill="rgba(0,0,0,0.2)" shape-rendering="auto"/>
  <!-- Tronco -->
  <rect x="7" y="10" width="2" height="5" fill="#5a3010"/>
  <!-- Copa inferior (oscura) -->
  <rect x="3" y="8" width="10" height="4" fill="#2d5a18"/>
  <rect x="2" y="9" width="2" height="2" fill="#2d5a18"/>
  <rect x="12" y="9" width="2" height="2" fill="#2d5a18"/>
  <!-- Copa media -->
  <rect x="4" y="5" width="8" height="4" fill="#3a7a22"/>
  <rect x="3" y="6" width="2" height="2" fill="#3a7a22"/>
  <rect x="11" y="6" width="2" height="2" fill="#3a7a22"/>
  <!-- Copa superior (clara) -->
  <rect x="5" y="2" width="6" height="4" fill="#4a9a2c"/>
  <rect x="4" y="3" width="2" height="2" fill="#4a9a2c"/>
  <rect x="10" y="3" width="2" height="2" fill="#4a9a2c"/>
  <!-- Punta -->
  <rect x="7" y="1" width="2" height="2" fill="#5ab030"/>
  <!-- Luz en copa superior -->
  <rect x="6" y="2" width="2" height="1" fill="#6ac040"/>
</svg>
