<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Sombra -->
  <ellipse cx="8" cy="15.5" rx="4" ry="1" fill="rgba(0,0,0,0.25)" shape-rendering="auto"/>
  <!-- Cabeza (sin sombrero especial) -->
  <rect x="6" y="1" width="4" height="4" fill="#d4956a"/>
  <!-- Pelo -->
  <rect x="6" y="1" width="4" height="1" fill="#3a2010"/>
  <!-- Ojos -->
  <rect x="7" y="3" width="1" height="1" fill="#2a1505"/>
  <rect x="9" y="3" width="1" height="1" fill="#2a1505"/>
  <!-- Delantal/Pecho: marrón cálido -->
  <rect x="5" y="5" width="6" height="6" fill="#8b5a20"/>
  <!-- Delantal más oscuro -->
  <rect x="6" y="6" width="4" height="5" fill="#6a4010"/>
  <!-- Brazo izquierdo -->
  <rect x="3" y="5" width="2" height="5" fill="#8b5a20"/>
  <!-- Brazo derecho levantado (golpe de martillo) -->
  <rect x="11" y="4" width="2" height="5" fill="#8b5a20"/>
  <!-- Martillo: cabeza -->
  <rect x="11" y="3" width="3" height="2" fill="#707070"/>
  <!-- Martillo: mango -->
  <rect x="12" y="5" width="1" height="4" fill="#7a5a14"/>
  <!-- Cinturón -->
  <rect x="5" y="10" width="6" height="1" fill="#4a2808"/>
  <!-- Piernas -->
  <rect x="5" y="11" width="2" height="3" fill="#4a2808"/>
  <rect x="9" y="11" width="2" height="3" fill="#4a2808"/>
  <!-- Botas -->
  <rect x="4" y="14" width="4" height="1" fill="#1a0e04"/>
  <rect x="8" y="14" width="4" height="1" fill="#1a0e04"/>
</svg>
