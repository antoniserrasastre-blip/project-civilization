<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Sombra -->
  <ellipse cx="8" cy="15.5" rx="4" ry="1" fill="rgba(0,0,0,0.25)" shape-rendering="auto"/>
  <!-- Yelmo simple -->
  <rect x="6" y="0" width="4" height="3" fill="#707a8a"/>
  <rect x="5" y="1" width="6" height="2" fill="#707a8a"/>
  <!-- Cabeza (visera) -->
  <rect x="6" y="3" width="4" height="3" fill="#d4956a"/>
  <!-- Ojos -->
  <rect x="7" y="4" width="1" height="1" fill="#2a1505"/>
  <rect x="9" y="4" width="1" height="1" fill="#2a1505"/>
  <!-- Cuerpo: cota de malla azul-gris -->
  <rect x="5" y="6" width="6" height="5" fill="#4a5a6a"/>
  <!-- Escudo izquierdo -->
  <rect x="2" y="6" width="3" height="4" fill="#6a3a14"/>
  <rect x="3" y="5" width="2" height="1" fill="#6a3a14"/>
  <rect x="3" y="10" width="2" height="1" fill="#6a3a14"/>
  <!-- Cruz en el escudo -->
  <rect x="3" y="7" width="1" height="2" fill="#c8a030"/>
  <rect x="2" y="8" width="3" height="1" fill="#c8a030"/>
  <!-- Brazo derecho -->
  <rect x="11" y="6" width="2" height="5" fill="#4a5a6a"/>
  <!-- Lanza -->
  <rect x="12" y="2" width="1" height="9" fill="#7a6030"/>
  <rect x="12" y="1" width="1" height="2" fill="#c0c0c0"/>
  <!-- Cinturón -->
  <rect x="5" y="10" width="6" height="1" fill="#2a3a4a"/>
  <!-- Piernas -->
  <rect x="5" y="11" width="2" height="3" fill="#2a3a4a"/>
  <rect x="9" y="11" width="2" height="3" fill="#2a3a4a"/>
  <!-- Botas -->
  <rect x="4" y="14" width="4" height="1" fill="#1a0e04"/>
  <rect x="8" y="14" width="4" height="1" fill="#1a0e04"/>
</svg>
