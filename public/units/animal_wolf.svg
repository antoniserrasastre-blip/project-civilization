<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="8" y="14" width="16" height="8" fill="#8b8b8b" />
  <!-- Underbelly -->
  <rect x="10" y="20" width="12" height="2" fill="#d0d0d0" />
  <!-- Legs -->
  <rect x="10" y="22" width="2" height="6" fill="#666666" />
  <rect x="20" y="22" width="2" height="6" fill="#666666" />
  <!-- Neck/Head -->
  <rect x="4" y="10" width="6" height="10" fill="#8b8b8b" />
  <rect x="2" y="12" width="6" height="4" fill="#8b8b8b" />
  <!-- Ears -->
  <rect x="6" y="8" width="2" height="4" fill="#8b8b8b" />
  <rect x="9" y="9" width="1" height="3" fill="#8b8b8b" />
  <!-- Nose/Eye -->
  <rect x="2" y="13" width="2" height="2" fill="#000000" />
  <rect x="6" y="11" width="2" height="2" fill="#000000" />
  <!-- Tail -->
  <rect x="24" y="14" width="4" height="6" fill="#8b8b8b" />
</svg>
