<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Base de la llama (Naranja Oscuro) -->
  <rect x="14" y="24" width="4" height="2" fill="#d35400"/>
  
  <!-- Cuerpo de la llama (Naranja) -->
  <rect x="12" y="16" width="8" height="8" fill="#ff8c00"/>
  <rect x="10" y="20" width="12" height="4" fill="#ff8c00"/>
  
  <!-- Núcleo de la llama (Amarillo) -->
  <rect x="14" y="18" width="4" height="6" fill="#ffff00"/>
  <rect x="13" y="20" width="6" height="4" fill="#ffff00"/>
  
  <!-- Puntas de la llama -->
  <rect x="12" y="14" width="2" height="2" fill="#ff8c00"/>
  <rect x="18" y="12" width="2" height="4" fill="#ff8c00"/>
  <rect x="15" y="10" width="2" height="2" fill="#ff8c00"/>
  
  <!-- Brillo blanco superior -->
  <rect x="15" y="18" width="2" height="2" fill="#ffffff" fill-opacity="0.5"/>
</svg>