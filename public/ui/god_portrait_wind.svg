<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Cabello/Viento superior -->
  <rect x="12" y="8" width="40" height="4" fill="#edf2f7"/>
  <rect x="10" y="12" width="44" height="4" fill="#cbd5e0"/>
  
  <!-- Rostro base -->
  <rect x="16" y="16" width="32" height="32" fill="#a0aec0"/>
  
  <!-- Ojos soplados -->
  <rect x="20" y="26" width="8" height="6" fill="#4a5568"/>
  <rect x="36" y="26" width="8" height="6" fill="#4a5568"/>
  <rect x="22" y="28" width="4" height="2" fill="#edf2f7"/>
  <rect x="38" y="28" width="4" height="2" fill="#edf2f7"/>
  
  <!-- Nariz de aire -->
  <rect x="30" y="32" width="4" height="10" fill="#718096"/>
  
  <!-- Boca soplante -->
  <rect x="26" y="44" width="12" height="4" fill="#4a5568"/>
  <rect x="28" y="48" width="8" height="4" fill="#cbd5e0"/>
  
  <!-- Barba de nubes -->
  <rect x="14" y="52" width="36" height="4" fill="#edf2f7"/>
  <rect x="12" y="56" width="40" height="4" fill="#cbd5e0"/>
  
  <!-- Partículas de viento (Dithering) -->
  <rect x="54" y="20" width="4" height="2" fill="#edf2f7"/>
  <rect x="58" y="28" width="2" height="2" fill="#cbd5e0"/>
  <rect x="52" y="40" width="6" height="2" fill="#edf2f7"/>
  <rect x="4" y="30" width="4" height="2" fill="#ffffff"/>
  <rect x="8" y="44" width="4" height="2" fill="#cbd5e0"/>
</svg>