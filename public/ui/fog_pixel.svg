<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Neblina de Misterio (WorldBox style) -->
  <!-- Patrón de píxeles negros con opacidad variable para simular densidad -->
  <g fill="#000000" fill-opacity="0.6">
    <!-- Una rejilla de 2x2 con huecos para ver el fondo -->
    <rect x="0" y="0" width="2" height="2"/> <rect x="4" y="0" width="2" height="2"/> <rect x="8" y="0" width="2" height="2"/> <rect x="12" y="0" width="2" height="2"/>
    <rect x="16" y="0" width="2" height="2"/> <rect x="20" y="0" width="2" height="2"/> <rect x="24" y="0" width="2" height="2"/> <rect x="28" y="0" width="2" height="2"/>
    
    <rect x="2" y="2" width="2" height="2"/> <rect x="6" y="2" width="2" height="2"/> <rect x="10" y="2" width="2" height="2"/> <rect x="14" y="2" width="2" height="2"/>
    <rect x="18" y="2" width="2" height="2"/> <rect x="22" y="2" width="2" height="2"/> <rect x="26" y="2" width="2" height="2"/> <rect x="30" y="2" width="2" height="2"/>

    <rect x="0" y="4" width="2" height="2"/> <rect x="4" y="4" width="2" height="2"/> <rect x="8" y="4" width="2" height="2"/> <rect x="12" y="4" width="2" height="2"/>
    <rect x="16" y="4" width="2" height="2"/> <rect x="20" y="4" width="2" height="2"/> <rect x="24" y="4" width="2" height="2"/> <rect x="28" y="4" width="2" height="2"/>

    <!-- Bloques más densos aleatorios -->
    <rect x="2" y="4" width="2" height="2" fill-opacity="0.8"/>
    <rect x="14" y="8" width="4" height="4" fill-opacity="0.4"/>
    <rect x="22" y="20" width="6" height="6" fill-opacity="0.3"/>
    
    <!-- Repetición del patrón base -->
    <rect x="2" y="6" width="2" height="2"/> <rect x="6" y="6" width="2" height="2"/> <rect x="10" y="6" width="2" height="2"/> <rect x="14" y="6" width="2" height="2"/>
    <rect x="18" y="6" width="2" height="2"/> <rect x="22" y="6" width="2" height="2"/> <rect x="26" y="6" width="2" height="2"/> <rect x="30" y="6" width="2" height="2"/>

    <!-- Rellenar el resto del grid con el patrón de damero -->
    <rect x="0" y="8" width="2" height="2"/> <rect x="4" y="8" width="2" height="2"/> <rect x="8" y="8" width="2" height="2"/> <rect x="12" y="8" width="2" height="2"/>
    <rect x="16" y="8" width="2" height="2"/> <rect x="20" y="8" width="2" height="2"/> <rect x="24" y="8" width="2" height="2"/> <rect x="28" y="8" width="2" height="2"/>
    <rect x="2" y="10" width="2" height="2"/> <rect x="6" y="10" width="2" height="2"/> <rect x="10" y="10" width="2" height="2"/> <rect x="14" y="10" width="2" height="2"/>
    <rect x="18" y="10" width="2" height="2"/> <rect x="22" y="10" width="2" height="2"/> <rect x="26" y="10" width="2" height="2"/> <rect x="30" y="10" width="2" height="2"/>
    
    <rect x="0" y="12" width="2" height="2"/> <rect x="4" y="12" width="2" height="2"/> <rect x="8" y="12" width="2" height="2"/> <rect x="12" y="12" width="2" height="2"/>
    <rect x="16" y="12" width="2" height="2"/> <rect x="20" y="12" width="2" height="2"/> <rect x="24" y="12" width="2" height="2"/> <rect x="28" y="12" width="2" height="2"/>
    <rect x="2" y="14" width="2" height="2"/> <rect x="6" y="14" width="2" height="2"/> <rect x="10" y="14" width="2" height="2"/> <rect x="14" y="14" width="2" height="2"/>
    <rect x="18" y="14" width="2" height="2"/> <rect x="22" y="14" width="2" height="2"/> <rect x="26" y="14" width="2" height="2"/> <rect x="30" y="14" width="2" height="2"/>

    <rect x="0" y="16" width="2" height="2"/> <rect x="4" y="16" width="2" height="2"/> <rect x="8" y="16" width="2" height="2"/> <rect x="12" y="16" width="2" height="2"/>
    <rect x="16" y="16" width="2" height="2"/> <rect x="20" y="16" width="2" height="2"/> <rect x="24" y="16" width="2" height="2"/> <rect x="28" y="16" width="2" height="2"/>
    <rect x="2" y="18" width="2" height="2"/> <rect x="6" y="18" width="2" height="2"/> <rect x="10" y="18" width="2" height="2"/> <rect x="14" y="18" width="2" height="2"/>
    <rect x="18" y="18" width="2" height="2"/> <rect x="22" y="18" width="2" height="2"/> <rect x="26" y="18" width="2" height="2"/> <rect x="30" y="18" width="2" height="2"/>

    <rect x="0" y="20" width="2" height="2"/> <rect x="4" y="20" width="2" height="2"/> <rect x="8" y="20" width="2" height="2"/> <rect x="12" y="20" width="2" height="2"/>
    <rect x="16" y="20" width="2" height="2"/> <rect x="20" y="20" width="2" height="2"/> <rect x="24" y="20" width="2" height="2"/> <rect x="28" y="20" width="2" height="2"/>
    <rect x="2" y="22" width="2" height="2"/> <rect x="6" y="22" width="2" height="2"/> <rect x="10" y="22" width="2" height="2"/> <rect x="14" y="22" width="2" height="2"/>
    <rect x="18" y="22" width="2" height="2"/> <rect x="22" y="22" width="2" height="2"/> <rect x="26" y="22" width="2" height="2"/> <rect x="30" y="22" width="2" height="2"/>

    <rect x="0" y="24" width="2" height="2"/> <rect x="4" y="24" width="2" height="2"/> <rect x="8" y="24" width="2" height="2"/> <rect x="12" y="24" width="2" height="2"/>
    <rect x="16" y="24" width="2" height="2"/> <rect x="20" y="24" width="2" height="2"/> <rect x="24" y="24" width="2" height="2"/> <rect x="28" y="24" width="2" height="2"/>
    <rect x="2" y="26" width="2" height="2"/> <rect x="6" y="26" width="2" height="2"/> <rect x="10" y="26" width="2" height="2"/> <rect x="14" y="26" width="2" height="2"/>
    <rect x="18" y="26" width="2" height="2"/> <rect x="22" y="26" width="2" height="2"/> <rect x="26" y="26" width="2" height="2"/> <rect x="30" y="26" width="2" height="2"/>

    <rect x="0" y="28" width="2" height="2"/> <rect x="4" y="28" width="2" height="2"/> <rect x="8" y="28" width="2" height="2"/> <rect x="12" y="28" width="2" height="2"/>
    <rect x="16" y="28" width="2" height="2"/> <rect x="20" y="28" width="2" height="2"/> <rect x="24" y="28" width="2" height="2"/> <rect x="28" y="28" width="2" height="2"/>
    <rect x="2" y="30" width="2" height="2"/> <rect x="6" y="30" width="2" height="2"/> <rect x="10" y="30" width="2" height="2"/> <rect x="14" y="30" width="2" height="2"/>
    <rect x="18" y="30" width="2" height="2"/> <rect x="22" y="30" width="2" height="2"/> <rect x="26" y="30" width="2" height="2"/> <rect x="30" y="30" width="2" height="2"/>
  </g>
</svg>