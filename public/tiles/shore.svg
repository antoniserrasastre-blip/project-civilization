<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Arena (Fondo superior) -->
  <rect width="32" height="16" fill="#f4a460"/>
  <!-- Agua poco profunda (Fondo inferior) -->
  <rect y="16" width="32" height="16" fill="#00bfff"/>
  <!-- Dithering/Borde de espuma -->
  <rect x="0" y="14" width="4" height="2" fill="#00f2ff"/>
  <rect x="8" y="16" width="4" height="2" fill="#00f2ff"/>
  <rect x="16" y="14" width="4" height="2" fill="#00f2ff"/>
  <rect x="24" y="16" width="4" height="2" fill="#00f2ff"/>
  <!-- Puntos de arena en agua -->
  <rect x="4" y="18" width="2" height="2" fill="#f4a460"/>
  <rect x="20" y="20" width="2" height="2" fill="#f4a460"/>
</svg>