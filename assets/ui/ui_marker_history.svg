<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Borde quemado / Sombra -->
  <rect x="6" y="6" width="20" height="20" fill="#3d2b1f"/>
  
  <!-- Papel pergamino -->
  <rect x="8" y="8" width="16" height="16" fill="#f5deb3"/>
  
  <!-- Bordes irregulares quemados -->
  <rect x="6" y="6" width="4" height="4" fill="#1a1a1a"/>
  <rect x="22" y="6" width="4" height="2" fill="#1a1a1a"/>
  <rect x="6" y="22" width="2" height="4" fill="#1a1a1a"/>
  <rect x="20" y="24" width="6" height="2" fill="#1a1a1a"/>
  
  <!-- "Texto" antiguo (píxeles sueltos) -->
  <rect x="10" y="10" width="4" height="2" fill="#3d2b1f"/>
  <rect x="16" y="10" width="6" height="2" fill="#3d2b1f"/>
  <rect x="10" y="14" width="12" height="2" fill="#3d2b1f"/>
  <rect x="10" y="18" width="8" height="2" fill="#3d2b1f"/>
  
  <!-- Brillo sutil -->
  <rect x="8" y="8" width="2" height="2" fill="#ffffff" fill-opacity="0.3"/>
</svg>