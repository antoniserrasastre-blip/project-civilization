<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo de tela -->
  <rect x="6" y="6" width="20" height="20" fill="#d2b48c" opacity="0.2"/>
  
  <!-- Hilos Verticales -->
  <rect x="10" y="4" width="2" height="24" fill="#a0522d"/>
  <rect x="15" y="4" width="2" height="24" fill="#8b4513"/>
  <rect x="20" y="4" width="2" height="24" fill="#5d2906"/>
  
  <!-- Hilos Horizontales (Entrelazados) -->
  <rect x="4" y="10" width="24" height="2" fill="#d2b48c"/>
  <rect x="4" y="15" width="24" height="2" fill="#f0e68c"/>
  <rect x="4" y="20" width="24" height="2" fill="#d2b48c"/>
  
  <!-- Puntos de cruce -->
  <rect x="10" y="10" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="15" y="15" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="20" y="20" width="2" height="2" fill="#ffd700" opacity="0.5"/>
</svg>
