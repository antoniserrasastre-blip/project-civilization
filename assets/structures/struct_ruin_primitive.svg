<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Sombra base/suelo -->
  <rect x="4" y="24" width="24" height="4" fill="#1a1a1a" fill-opacity="0.3"/>
  
  <!-- Estructura de madera rota (derecha) -->
  <rect x="20" y="16" width="4" height="12" fill="#5d2906"/>
  <rect x="20" y="16" width="2" height="10" fill="#a0522d"/>
  
  <!-- Estructura de madera caída (izquierda) -->
  <rect x="6" y="22" width="12" height="4" fill="#5d2906"/>
  <rect x="6" y="22" width="10" height="2" fill="#a0522d"/>
  
  <!-- Restos de paja -->
  <rect x="18" y="22" width="6" height="4" fill="#decb8b"/>
  <rect x="10" y="24" width="6" height="2" fill="#decb8b"/>
  <rect x="22" y="20" width="2" height="2" fill="#decb8b"/>
  
  <!-- Maleza/Musgo (verde oscuro) -->
  <rect x="20" y="20" width="2" height="2" fill="#228b22"/>
  <rect x="22" y="24" width="2" height="2" fill="#228b22"/>
  <rect x="16" y="22" width="2" height="2" fill="#228b22"/>
  <rect x="8" y="20" width="2" height="2" fill="#228b22"/>
  <rect x="6" y="24" width="2" height="2" fill="#228b22"/>
  <rect x="24" y="16" width="2" height="4" fill="#228b22"/>
  <rect x="20" y="14" width="2" height="2" fill="#228b22"/>
</svg>