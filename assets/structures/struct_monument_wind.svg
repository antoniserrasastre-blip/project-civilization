<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Monolito de Viento -->
  <rect x="10" y="4" width="12" height="24" fill="#cbd5e0"/>
  <rect x="10" y="4" width="6" height="24" fill="#edf2f7" fill-opacity="0.5"/>
  
  <!-- Cara sutil en la parte superior -->
  <rect x="13" y="8" width="2" height="2" fill="#4a5568"/>
  <rect x="17" y="8" width="2" height="2" fill="#4a5568"/>
  <rect x="15" y="11" width="2" height="1" fill="#718096"/>
  
  <!-- Tallas de nubes -->
  <rect x="12" y="16" width="4" height="2" fill="#edf2f7"/>
  <rect x="16" y="20" width="4" height="2" fill="#edf2f7"/>
  <rect x="12" y="24" width="6" height="1" fill="#edf2f7"/>
  
  <!-- Base -->
  <rect x="6" y="28" width="20" height="4" fill="#a0aec0"/>
  <rect x="8" y="28" width="16" height="1" fill="#edf2f7"/>
</svg>